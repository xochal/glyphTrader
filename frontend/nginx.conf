server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Block source maps
    location ~* \.map$ {
        return 404;
    }

    # SPA: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    # Serve docs directory directly (user guide)
    location /docs/ {
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
